<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВТШ ТАЛДЫКОРГАН</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #layout { display: flex; width: 100%; height: 100%; }
        #frame { width: 100%; height: 100%; border: none; display: block; background: #fff; }
        
        #menu { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; 
            background: #fff; border-radius: 30px 30px 0 0; z-index: 9999; 
            transform: translateY(calc(50vh - 70px)); 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* УВЕДОМЛЕНИЕ */
        #notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #34C759; color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; z-index: 10000; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .handle { height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .line { width: 60px; height: 6px; background: #ccc; border-radius: 5px; }
        #content { height: 100%; overflow-y: auto; padding: 20px; }
        .btn { display: block; width: 100%; padding: 18px; margin-bottom: 12px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-action { background: #007aff; color: #fff; }
        .btn-exit { background: #ff3b30; color: #fff; }
        .link-btn { text-align: left; padding-left: 20px; color: rgba(0,0,0,0.7); opacity: 0.4; }
        .link-btn.active-chapter { opacity: 1 !important; transform: scale(1.02); border-left: 10px solid rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="notification">✅ Выход из аккаунта выполнен</div>

<div id="layout">
    <iframe id="frame" name="main-frame" src="https://pddtest.kz/"></iframe>
</div>

<div id="menu">
    <div class="handle" id="handle"><div class="line"></div></div>
    <div id="content" id="mobile-links">
        <button class="btn btn-action" onclick="goToAuth()">🔑 Вход в аккаунт</button>
        <button class="btn btn-exit" onclick="resetSystem()">🚪 ВЫЙТИ</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <div id="links-container"></div>
    </div>
</div>

<script>
    const iosColors = ['#FF9500', '#34C759', '#007AFF', '#5856D6', '#FF2D55', '#AF52DE', '#5AC8FA', '#FF3B30'];
    const links = [
        {name: "1. Общие положения", url: "https://pddtest.kz/tests/116573900"},
        {name: "5. Светофоры", url: "https://pddtest.kz/tests/116695046"},
        {name: "13. Перекрестки", url: "https://pddtest.kz/tests/116696211"},
        {name: "🏁 Все знаки", url: "https://pddtest.kz/tests/116698417"}
    ];

    const frame = document.getElementById('frame');
    const menu = document.getElementById('menu');
    const notify = document.getElementById('notification');

    function showNotify() {
        notify.style.transform = 'translateX(-50%) translateY(0px)';
        setTimeout(() => { notify.style.transform = 'translateX(-50%) translateY(-100px)'; }, 3000);
    }

    // ВХОД
    function goToAuth() {
        const win = window.open('https://pddtest.kz/auth', '_blank');
        const timer = setInterval(() => { if (win.closed) { clearInterval(timer); frame.src = frame.src; } }, 1000);
    }

    // ВЫХОД БЕЗ УДАЛЕНИЯ САЙТА
    function resetSystem() {
        // Открываем логаут в маленьком окне
        const logoutWin = window.open('https://pddtest.kz/logout', 'logoutWin', 'width=100,height=100,left=-1000,top=-1000');
        
        // Через 2 секунды закрываем окно логаута и обновляем фрейм
        setTimeout(() => {
            if (logoutWin) logoutWin.close();
            frame.src = "https://pddtest.kz/";
            document.querySelectorAll('.link-btn').forEach(b => b.classList.remove('active-chapter'));
            showNotify(); // Показываем уведомление
            toggle(false);
        }, 2000);
    }

    // Таймер бездействия (30 минут)
    let idleTimer = setTimeout(resetSystem, 1800000);
    document.addEventListener('touchstart', () => { clearTimeout(idleTimer); idleTimer = setTimeout(resetSystem, 1800000); });

    function toggle(open) { menu.style.transform = open ? 'translateY(0)' : 'translateY(calc(50vh - 70px))'; }
    document.getElementById('handle').addEventListener('click', () => toggle(menu.style.transform !== 'translateY(0px)'));

    const container = document.getElementById('links-container');
    links.forEach((l, index) => {
        let b = document.createElement('button');
        b.className = 'btn link-btn';
        b.innerText = l.name;
        b.style.backgroundColor = iosColors[index % iosColors.length];
        b.onclick = () => {
            document.querySelectorAll('.link-btn').forEach(btn => btn.classList.remove('active-chapter'));
            b.classList.add('active-chapter');
            frame.src = l.url;
            toggle(false);
        };
        container.appendChild(b);
    });
</script>
</body>
</html>
